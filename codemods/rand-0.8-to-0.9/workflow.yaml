# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: "1"

nodes:
  - id: jssg-apply
    name: Transform Rust source files
    type: automatic
    steps:
      - name: "Migrate rand 0.8 APIs to 0.9"
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: "rust"
      - name: "Install rand-0-8-to-0-9 skill"
        install-skill:
          package: "rand-0-8-to-0-9"
