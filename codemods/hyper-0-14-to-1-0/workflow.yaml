# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: "1"

nodes:
  - id: jssg-apply
    name: Transform Rust source files
    type: automatic
    steps:
      - name: "Migrate hyper 0.14 client imports and type paths"
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: "rust"
      - name: "Migrate hyper Cargo.toml dependency"
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: "toml"
      - name: "Install hyper-0-14-to-1-0 skill"
        install-skill:
          package: "hyper-0-14-to-1-0"
