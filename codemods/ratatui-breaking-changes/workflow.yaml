# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: "1"

nodes:
  - id: jssg-apply
    name: Transform Rust source files
    type: automatic
    steps:
      - name: "Migrate ratatui breaking changes in Rust files"
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: "rust"
      - name: "Install ratatui-breaking-changes skill"
        install-skill:
          package: "ratatui-breaking-changes"
