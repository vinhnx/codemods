name: Publish Codemod
on:
  push:
    tags:
      - "*@v*"
  workflow_dispatch:
    inputs:
      codemod:
        description: "Codemod slug to publish"
        required: true
        type: string
      version:
        description: "Version tag (e.g. v1.0.8)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract codemod name from tag
        id: extract
        run: |
          if [ -n "${{ inputs.codemod }}" ]; then
            CODEMOD_NAME="${{ inputs.codemod }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            CODEMOD_NAME="${TAG%@v*}"
          fi
          echo "codemod_name=$CODEMOD_NAME" >> $GITHUB_OUTPUT

      - name: Publish codemod
        uses: codemod/publish-action@v1
        with:
          path: codemods/${{ steps.extract.outputs.codemod_name }}
